version: 1
plan_source: "Docs/pentest-plan.yaml"
deployment_context:
  environment: "Developer laptops"
  network: "ZTNA"
  users: "Internal devs"
  endpoint_protection: "EDR"
  staging: "Yes"
safety_level: "N"

findings:
  # ── v0.0.5 findings (carried forward) ──────────────────────────────
  - id: "INJ-001"
    title: "Skill override prompt injection via .claude/skills/ write"
    priority: "P1"
    classification: "CONFIRMED_VULN"
    decision: ACCEPT
    decision_reason: "Requires compromised insider with filesystem write access. With ZTNA + EDR, if attacker can write to project dir, we're already compromised. Rely on anomaly detection."
    evidence_file: "output/results.json"
    triaged_at: "2026-04-10T07:00:00Z"

  - id: "INJ-004"
    title: "Stored prompt injection via write_ledger/write_progress"
    priority: "P2"
    classification: "CONFIRMED_VULN"
    decision: FIX
    decision_reason: "Exploitable by compromised worker agent via official API — no filesystem access needed. Notes field flows into session_hint LLM directive."
    fix_version: "v0.0.5"
    evidence_file: "output/results.json"
    triaged_at: "2026-04-10T07:01:00Z"

  - id: "INJ-003"
    title: "run_tests tool provides arbitrary shell execution"
    priority: "P2"
    classification: "CONFIRMED_VULN"
    decision: FIX
    decision_reason: "Pre-implementation finding. Amend v0.0.5 spec with command allowlist before building."
    fix_version: "v0.0.5"
    evidence_file: "output/results.json"
    triaged_at: "2026-04-10T07:02:00Z"

  - id: "INJ-005"
    title: "capability_check PATH poisoning"
    priority: "P3"
    classification: "LIKELY_VULN"
    decision: FIX
    decision_reason: "Resolve codex/gemini to absolute paths at startup."
    fix_version: "v0.0.5"
    evidence_file: "output/results.json"
    triaged_at: "2026-04-10T07:03:00Z"

  - id: "INJ-002"
    title: "Ledger/progress JSON tampering (no schema on read)"
    priority: "P3"
    classification: "CONFIRMED_VULN"
    decision: ACCEPT
    decision_reason: "Attacker who can write the file can also edit the code directly. With ZTNA + EDR, this is defense-in-depth."
    evidence_file: "output/results.json"
    triaged_at: "2026-04-10T07:04:00Z"

  - id: "ESC-001"
    title: "No authentication on MCP tools"
    priority: "P3"
    classification: "DEFENSE_GAP"
    decision: ACCEPT
    decision_reason: "Small attack surface (stdio only, no network). Same-user privilege — any process that can spawn foreman-mcp already has equivalent access. ZTNA + EDR covers the threat model."
    evidence_file: "output/results.json"
    triaged_at: "2026-04-10T08:00:00Z"

  - id: "DIS-001"
    title: "Skill loader error leaks filesystem paths"
    priority: "P3"
    classification: "LIKELY_VULN"
    decision: FIX
    decision_reason: "Return generic error to MCP client. Log full paths to stderr only."
    fix_version: "v0.0.5"
    evidence_file: "output/results.json"
    triaged_at: "2026-04-10T07:06:00Z"

  - id: "EXH-002"
    title: "Unbounded rejection array growth"
    priority: "P3"
    classification: "DEFENSE_GAP"
    decision: FIX
    decision_reason: "Cap rej[] at 20 entries FIFO. Add .max(10000) to msg field."
    fix_version: "v0.0.5"
    evidence_file: "output/results.json"
    triaged_at: "2026-04-10T07:07:00Z"

  # ── v0.0.6 findings ───────────────────────────────────────────────
  - id: "INJ-008"
    title: "npx in DEFAULT_ALLOWED_RUNNERS = arbitrary package execution"
    priority: "P2"
    classification: "LIKELY_VULN"
    decision: FIX
    decision_reason: "npx downloads and runs arbitrary packages by design. Remove from default allowlist. npm test covers CI."
    fix_version: "v0.0.7"
    evidence_file: "output/analysis-INJECTION-v006.json"
    triaged_at: "2026-04-11T05:10:00Z"

  - id: "INJ-006"
    title: "ComSpec env var poisoning redirects .cmd shim wrapper"
    priority: "P3"
    classification: "DEFENSE_GAP"
    decision: FIX
    decision_reason: "Hardcode cmd.exe path or validate ComSpec. Narrow surface but free to fix."
    fix_version: "v0.0.7"
    evidence_file: "output/analysis-INJECTION-v006.json"
    triaged_at: "2026-04-11T05:11:00Z"

  - id: "INJ-007"
    title: "FOREMAN_TEST_ALLOWLIST env var bypasses runner allowlist"
    priority: "P3"
    classification: "DEFENSE_GAP"
    decision: FIX
    decision_reason: "Add regex filter on env entries. Already editing runTests.ts for INJ-008 — near-zero marginal cost."
    fix_version: "v0.0.7"
    evidence_file: "output/analysis-INJECTION-v006.json"
    triaged_at: "2026-04-11T05:12:00Z"

  - id: "INJ-009"
    title: "Advisor stdout forges TOON key:value lines in invoke_advisor output"
    priority: "P3"
    classification: "DEFENSE_GAP"
    decision: FIX
    decision_reason: "Escape newlines in stdout/stderr values before toKeyValue, or use JSON output."
    fix_version: "v0.0.7"
    evidence_file: "output/analysis-INJECTION-v006.json"
    triaged_at: "2026-04-11T05:13:00Z"

  - id: "EXH-004"
    title: "runTests buffer grows between cap check and process kill"
    priority: "P3"
    classification: "DEFENSE_GAP"
    decision: FIX
    decision_reason: "One-line fix: if(settled)return at top of data handlers. Already editing runTests.ts."
    fix_version: "v0.0.7"
    evidence_file: "output/analysis-EXHAUSTION-v006.json"
    triaged_at: "2026-04-11T05:14:00Z"

  - id: "EXH-005"
    title: "Timeout kill misses grandchild processes"
    priority: "P3"
    classification: "DEFENSE_GAP"
    decision: FIX
    decision_reason: "Needs detached:true + process group kill. Cross-platform implications need dedicated design pass. Deferred from v0.0.7."
    fix_version: "v0.0.8"
    evidence_file: "output/analysis-EXHAUSTION-v006.json"
    triaged_at: "2026-04-11T05:15:00Z"
