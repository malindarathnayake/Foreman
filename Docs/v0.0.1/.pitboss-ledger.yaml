decisions:
  - unit: "1a"
    what: "Per-path mutex registry instead of single global lock"
    why: "Different ledger files can be written independently without contention"
  - unit: "1b"
    what: "Separate mutex instance from ledger (progressLockRegistry)"
    why: "Spec requires separate mutex — ledger and progress are independent resources"
  - unit: "3a"
    what: "readLedger query:full returns JSON, not TOON"
    why: "Design-summary serialization policy says JSON for deeply nested/irregular data. The full ledger is nested (phases→units→rejections)."
  - unit: "4a"
    what: "Skills path resolved with fallback from dist/ to src/skills/"
    why: "tsc doesn't copy .md assets to dist/. Fallback ensures production and dev both work."

codex_reviews:
  - phase: 1
    status: COMPLETED
    findings:
      - id: 1
        severity: MEDIUM
        summary: "Phase name drift — progress units stored phase key instead of phase name"
        verdict: CONFIRMED
        reason: "Fixed by worker a03b9"
      - id: 2
        severity: LOW
        summary: "Ledger is THE workflow authority — host plan/task state is ephemeral"
        verdict: REJECTED
        reason: "Architectural decision, not a code bug — documented in PROGRESS.md"
      - id: 3
        severity: LOW
        summary: "Implementor must run via SkillTool only"
        verdict: REJECTED
        reason: "Execution path concern — Phase 4 will address via skill frontmatter"
    deferred_concerns: []

  - phase: 2
    status: COMPLETED
    findings:
      - id: 1
        severity: MEDIUM
        summary: "Timeout test doesn't verify partial output or SIGKILL escalation"
        verdict: CONFIRMED
        reason: "Test strengthened — now writes 'partial' before stalling and asserts it's preserved"
      - id: 2
        severity: LOW
        summary: "Stdin test doesn't fail on unexpected data arrival"
        verdict: CONFIRMED
        reason: "Test strengthened — added 'data' handler that exits non-zero if data arrives"
    deferred_concerns:
      - "SIGKILL escalation path (SIGTERM-ignoring process) not tested — would need 5s+ test, deferred"

  - phase: 3
    status: COMPLETED
    findings:
      - id: 1
        severity: HIGH
        summary: "readLedger full query returns JSON instead of TOON"
        verdict: REJECTED
        reason: "Design-summary serialization policy says JSON for deeply nested/irregular data. The full ledger (phases→units→rejections) qualifies. TOON is used for the list queries (verdicts, rejections, phase_gates)."
      - id: 2
        severity: HIGH
        summary: "writeProgress markdown regeneration is optional and unsynchronized"
        verdict: REJECTED
        reason: "Markdown is 'rendered view, not authoritative' (spec Change 4). JSON state IS synchronized. MCP calls are sequential per-server (spec Change 2), so concurrent writes through MCP can't race."
      - id: 3
        severity: MEDIUM
        summary: "normalizeReview parser drops description after severity-only lines"
        verdict: CONFIRMED
        reason: "Parser bug — when severity line has no body text, subsequent lines weren't accumulated. Fixed by worker a12b9f626d85176dd."
      - id: 4
        severity: MEDIUM
        summary: "toTable doesn't escape pipes in cell content"
        verdict: REJECTED
        reason: "TOON is a simple spec-defined format with no escape mechanism. Data sources are controlled (unit IDs, statuses, timestamps). Theoretical concern for a v2 enhancement."
    deferred_concerns:
      - "toTable pipe escaping — revisit if free-form user text enters TOON tables in a future phase"

  - phase: 4
    status: COMPLETED
    findings:
      - id: 1
        severity: HIGH
        summary: "Skills path resolves from __dirname, breaks when running from dist/"
        verdict: CONFIRMED
        reason: "tsc doesn't copy .md assets. dist/skills/ won't exist. Fixed by adding fileExists check with fallback to ../src/skills/. Also replaced silent catch with stderr warning."
      - id: 2
        severity: MEDIUM
        summary: "Integration tests only exercise src path, not dist path"
        verdict: REJECTED
        reason: "Spec requires InMemoryTransport test client (MCP SDK testing pattern). Build pipeline testing is a CI concern, not a Phase 4 unit test requirement. Finding 1 fix addresses the underlying risk."
      - id: 3
        severity: LOW
        summary: "Resource content tests only cover planner, not implementor"
        verdict: CONFIRMED
        reason: "Added test asserting implementor resource contains disableSlashCommand: true, slash-command guard text, and ledger prohibition."
    deferred_concerns:
      - "Pre-existing tsc --noEmit error in writeLedger.ts:17 (unit_id can be undefined for UpdatePhaseGateInput) — Phase 3 issue, not Phase 4 regression"

rejections: []
