name: Build & Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: foreman-mcp/package-lock.json
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        working-directory: foreman-mcp
        run: npm ci

      - name: Build
        working-directory: foreman-mcp
        run: npm run build

      - name: Run tests
        working-directory: foreman-mcp
        run: npm test

      - name: Package
        working-directory: foreman-mcp
        run: |
          mkdir -p ../artifacts
          npm pack --pack-destination ../artifacts/

      - name: Upload CI artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: foreman-mcp-${{ github.sha }}
          path: artifacts/*.tgz
          retention-days: 30

      - name: Detect semver validity
        id: semver
        working-directory: foreman-mcp
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "Version $version is valid semver — npm publish will run."
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "Version $version is NOT valid semver — skipping npm publish. GitHub Release still created."
          fi

      - name: Publish to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/v') && steps.semver.outputs.valid == 'true'
        working-directory: foreman-mcp
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tgz
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.semver.outputs.valid == 'false' }}
