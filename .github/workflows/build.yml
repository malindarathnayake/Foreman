name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: foreman-mcp/package-lock.json

      - name: Install dependencies
        working-directory: foreman-mcp
        run: npm ci

      - name: Build
        working-directory: foreman-mcp
        run: npm run build

      - name: Run tests
        working-directory: foreman-mcp
        run: npm test

      - name: Package
        working-directory: foreman-mcp
        run: |
          mkdir -p ../artifacts
          npm pack --pack-destination ../artifacts/

      - name: Upload CI artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: foreman-mcp-${{ github.sha }}
          path: artifacts/*.tgz
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tgz
          generate_release_notes: true
          draft: false
