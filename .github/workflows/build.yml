name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: foreman-mcp/package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: '@malindarathnayake'

      - name: Install dependencies
        working-directory: foreman-mcp
        run: npm ci

      - name: Build
        working-directory: foreman-mcp
        run: npm run build

      - name: Run tests
        working-directory: foreman-mcp
        run: npm test

      - name: Package
        working-directory: foreman-mcp
        run: |
          # Pack into a fresh CI-only directory (release-pkg/), NOT the
          # committed artifacts/ archive. This guarantees the Release step
          # ships ONLY the current version's tarball — historical tarballs
          # live in artifacts/ for archival reference, not for redistribution.
          mkdir -p ../release-pkg
          npm pack --pack-destination ../release-pkg/

      - name: Upload CI artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: foreman-mcp-${{ github.sha }}
          path: release-pkg/*.tgz
          retention-days: 30

      - name: Publish to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: foreman-mcp
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-pkg/*.tgz
          generate_release_notes: true
          draft: false
