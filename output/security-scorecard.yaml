scores:
  current:
    D1_input_validation:
      score: 8
      weight: 0.10
      evidence: "Zod schemas on all 15 tools — .max() length caps (10K default, 50K for raw_text, 100K for prompts), enum restrictions on operations/status/event codes, regex filter on runner names (/^[a-zA-Z0-9_.-]+$/), discriminated unions for write operations. Validation at boundary (server.ts + types.ts)."
    D2_authentication:
      score: 5
      weight: 0.15
      evidence: "Stdio-only transport (StdioServerTransport). No per-tool auth. Trust-the-transport model — parent process (Claude Code) is the auth boundary. ESC-001 accepted: same-user privilege, ZTNA+EDR compensating."
    D3_authorization:
      score: 1
      weight: 0.10
      evidence: "No RBAC, scopes, or role checks. All tools available to all callers. Pitboss gate (set_verdict requires prior delegation) is workflow enforcement, not security authz. ESC-001 accepted."
    D4_transport:
      score: 5
      weight: 0.10
      evidence: "Stdio-only (server.ts:521-524). No HTTP/network exposure. No TLS needed. Trust-the-transport appropriate for stdio."
    D5_injection:
      score: 8
      weight: 0.15
      evidence: "Multi-layer defense: runner allowlist (6 runners), regex filter on env entries, npx explicitly denied (INJ-008), absolute path resolution via which/where, .cmd/.bat rejection on Windows, stdin delivery for advisor prompts (not args), ComSpec via SystemRoot (INJ-006), block format output (INJ-009). Accepted residual: npm exec. spawn() uses array args, no shell=true."
    D6_secrets:
      score: 6
      weight: 0.10
      evidence: "No secrets in source, env, or config. No credential handling. Error responses are generic (no leaks). Only env vars read: SystemRoot (OS-set), FOREMAN_TEST_ALLOWLIST (config). No vault needed — no secrets to manage."
    D7_resources:
      score: 7
      weight: 0.10
      evidence: "Buffer caps: externalCli 16KB, runTests 4x multiplier hardCap. Timeouts: all external calls bounded (1ms-600s via Zod). FIFO caps: rejection array 20, journal events 200/session, sessions 50, error_log 20. Input length caps on all strings. Settled guards prevent double-resolution. No rate limiting (MCP-level concern). EXH-004 fixed."
    D8_disclosure:
      score: 7
      weight: 0.10
      evidence: "Generic error messages in all tool responses. Stack traces to stderr only (startup diagnostics). DIS-001 fixed v0.0.5: skill loader returns generic errors. Minor: skill loader logs lookup paths to stderr (non-client-facing)."
    D9_dependencies:
      score: 7
      weight: 0.05
      evidence: "2 prod deps (MCP SDK, Zod). 3 dev deps. npm audit: 2 moderate (hono cookie/serveStatic/IP via MCP SDK transitive) — not reachable via stdio transport but present in tree. Fixable via npm audit fix. Lock file committed."
    D10_execution:
      score: 6
      weight: 0.05
      evidence: "3 spawn calls (runExternalCli, runWithStdin, runTests) — all safe: no shell=true, array args, absolute paths. Zero eval/Function/vm/dynamic imports. Atomic file writes. Runner allowlist + regex. Accepted residual: npm exec. Open: EXH-005 grandchild process kill deferred to v0.0.8."
    composite: 60
    grade: "D"

  projected:
